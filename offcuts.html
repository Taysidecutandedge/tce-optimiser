<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>TCE — Offcut Stock</title>
<style>
:root{--bg:#0a0b0f;--surf:#15171e;--surf2:#1e2128;--brd:#2a2e38;--txt:#f0eeea;--txt2:#a8b0bd;--txt3:#6b7280;--acc:#d4820a;--ok:#27ae60;--warn:#c0392b;--mono:'SF Mono',ui-monospace,Menlo,Consolas,monospace}
*{box-sizing:border-box;margin:0;padding:0;touch-action:manipulation}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--txt);font-size:15px;line-height:1.4;-webkit-text-size-adjust:100%}
.wrap{max-width:760px;margin:0 auto;padding:0 0 90px}
header{position:sticky;top:0;z-index:10;background:var(--surf);border-bottom:2px solid var(--acc);padding:12px 16px;display:flex;align-items:center;gap:10px}
header h1{font-size:16px;font-weight:700;letter-spacing:.3px}
header .sub{font-size:11px;color:var(--txt3);font-family:var(--mono)}
header .right{margin-left:auto;display:flex;gap:8px;align-items:center}
a.link,button{font-family:inherit}
.btn{background:var(--surf2);border:1px solid var(--brd);color:var(--txt);border-radius:8px;padding:9px 14px;font-size:14px;cursor:pointer;font-weight:600}
.btn:active{transform:scale(.97)}
.btn-acc{background:var(--acc);color:#111;border-color:var(--acc)}
.btn-sm{padding:6px 10px;font-size:13px;border-radius:6px}
.btn-ghost{background:transparent}
.btn-danger{color:#ff8a80;border-color:#5a2a2a}
section{padding:14px 16px}
.card{background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:14px;margin-bottom:14px}
.card h2{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--acc);margin-bottom:10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{display:flex;flex-direction:column;gap:4px}
.field.full{grid-column:1/-1}
.field label{font-size:11px;color:var(--txt2);font-weight:600}
input,select{background:var(--surf2);border:1px solid var(--brd);color:var(--txt);border-radius:8px;padding:11px;font-size:16px;width:100%;font-family:inherit}
input:focus,select:focus{outline:none;border-color:var(--acc)}
.row-inline{display:flex;gap:8px;align-items:center}
.chk{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--txt2)}
.chk input{width:20px;height:20px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.toolbar input[type=search]{flex:1;min-width:140px}
.toolbar select{width:auto;min-width:110px}
.count{font-size:12px;color:var(--txt3);font-family:var(--mono)}
.oc{background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:12px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start}
.oc .swatch{width:34px;height:34px;border-radius:7px;flex-shrink:0;border:1px solid rgba(255,255,255,.15)}
.oc .body{flex:1;min-width:0}
.oc .code{font-family:var(--mono);font-size:12px;color:var(--acc);font-weight:700;letter-spacing:.5px}
.oc .decor{font-size:15px;font-weight:700;margin:1px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.oc .meta{font-size:13px;color:var(--txt2);font-family:var(--mono)}
.oc .loc{display:inline-block;background:var(--surf2);border:1px solid var(--brd);border-radius:5px;padding:1px 7px;font-size:12px;color:var(--txt);margin-top:4px;font-family:var(--mono)}
.oc .acts{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.pill-qty{font-family:var(--mono);font-size:12px;color:var(--txt3)}
.empty{text-align:center;color:var(--txt3);padding:40px 16px;font-size:14px}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#fff;color:#111;padding:10px 18px;border-radius:10px;font-weight:600;font-size:14px;box-shadow:0 8px 30px rgba(0,0,0,.5);z-index:100;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
.toast.err{background:#c0392b;color:#fff}
/* login */
#login{max-width:380px;margin:60px auto;padding:0 18px}
#login .card{padding:22px}
#login h1{font-size:20px;margin-bottom:4px}
#login p{font-size:13px;color:var(--txt3);margin-bottom:18px}
.hidden{display:none!important}
/* sticky add button on mobile */
.fab{position:fixed;bottom:16px;right:16px;z-index:20}
/* print label */
@media print{
  body *{visibility:hidden}
  #labelArea,#labelArea *{visibility:visible}
  #labelArea{position:absolute;left:0;top:0;width:57mm;height:32mm;padding:2mm;color:#000;background:#fff}
}
#labelArea{display:none}
.lbl-code{font-family:var(--mono);font-weight:700;font-size:20pt}
.lbl-decor{font-size:10pt;font-weight:700}
.lbl-meta{font-size:9pt}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="hidden">
  <div class="card">
    <h1>Offcut Stock</h1>
    <p>Sign in with your TCE optimiser account.</p>
    <div class="field" style="margin-bottom:10px"><label>Email</label><input id="li-email" type="email" autocomplete="username"></div>
    <div class="field" style="margin-bottom:16px"><label>Password</label><input id="li-pass" type="password" autocomplete="current-password"></div>
    <button class="btn btn-acc" style="width:100%" onclick="doLogin()">Sign in</button>
    <div id="li-err" style="color:#ff8a80;font-size:13px;margin-top:10px"></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <header>
    <div>
      <h1>Offcut Stock</h1>
      <div class="sub" id="userline"></div>
    </div>
    <div class="right">
      <a class="btn btn-sm btn-ghost" href="./index.html">◀ Optimiser</a>
      <button class="btn btn-sm btn-ghost" onclick="signOut()">Sign out</button>
    </div>
  </header>

  <div class="wrap">
    <!-- ADD -->
    <section>
      <div class="card">
        <h2>Add offcut</h2>
        <div class="grid">
          <div class="field full">
            <label>Decor / colour</label>
            <input id="f-name" list="decorlist" placeholder="e.g. Egger H1385 Natural Castella Oak" oninput="onDecorInput()">
            <datalist id="decorlist"></datalist>
          </div>
          <div class="field full">
            <label>Customer / job <span style="color:var(--txt3)">(optional)</span></label>
            <input id="f-cust" placeholder="e.g. Deeside Timber Crafts">
          </div>
          <div class="field"><label>Length (mm)</label><input id="f-l" type="number" inputmode="numeric" placeholder="1200"></div>
          <div class="field"><label>Width (mm)</label><input id="f-w" type="number" inputmode="numeric" placeholder="480"></div>
          <div class="field"><label>Thickness (mm)</label><input id="f-thick" type="number" inputmode="decimal" step="0.1" placeholder="18"></div>
          <div class="field"><label>Quantity</label><input id="f-qty" type="number" inputmode="numeric" value="1" min="1"></div>
          <div class="field"><label>Bay / location</label><input id="f-loc" placeholder="e.g. Rack B3"></div>
          <div class="field"><label>Colour swatch</label><input id="f-color" type="color" value="#4e9af1" style="height:46px;padding:4px"></div>
          <div class="field full">
            <div class="chk"><input id="f-grain" type="checkbox" checked><label for="f-grain" style="font-size:14px">Grain runs along the length</label></div>
          </div>
        </div>
        <button class="btn btn-acc" id="addBtn" style="width:100%;margin-top:12px" onclick="addOffcut()">+ Add to stock</button>
        <button class="btn btn-ghost" id="cancelEditBtn" style="display:none;width:100%;margin-top:8px" onclick="exitEditMode()">Cancel edit</button>
      </div>
    </section>

    <!-- LIST -->
    <section style="padding-top:0">
      <div class="toolbar">
        <input id="q" type="search" placeholder="Search decor, code, bay…" oninput="renderList()">
        <select id="fthick" onchange="renderList()"><option value="">All thickness</option></select>
        <span class="count" id="count"></span>
      </div>
      <div id="list"></div>
    </section>
  </div>
</div>

<!-- hidden print label -->
<div id="labelArea">
  <div class="lbl-code" id="lbl-code"></div>
  <div class="lbl-decor" id="lbl-decor"></div>
  <div class="lbl-meta" id="lbl-meta"></div>
  <div class="lbl-meta" id="lbl-loc"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB_URL='https://mxjduublgtlpqtdgutzi.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14amR1dWJsZ3RscHF0ZGd1dHppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwOTg2MjMsImV4cCI6MjA5MTY3NDYyM30.wfG9a91Udp7KQ7ywda6aNS9k-n79qtrGSe-epuCuk34';
let _token=null,_user=null;
let _offcuts=[],_decors=[],_editingId=null;

const H=()=>({'apikey':SB_KEY,'Authorization':'Bearer '+(_token||SB_KEY),'Content-Type':'application/json'});
const Hrep=()=>({...H(),'Prefer':'return=representation'});
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const $=id=>document.getElementById(id);

function toast(msg,err){const t=$('toast');t.textContent=msg;t.className='toast show'+(err?' err':'');setTimeout(()=>t.className='toast',1900);}

// ---- auth ----
async function init(){
  const tok=localStorage.getItem('tce_token');
  if(tok){
    try{
      const r=await fetch(SB_URL+'/auth/v1/user',{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+tok}});
      if(r.ok){const d=await r.json();_token=tok;_user={id:d.id,email:d.email};return showApp();}
    }catch(e){}
  }
  showLogin();
}
function showLogin(){$('login').classList.remove('hidden');$('app').classList.add('hidden');}
async function showApp(){
  $('login').classList.add('hidden');$('app').classList.remove('hidden');
  $('userline').textContent=_user.email;
  await loadDecors();
  await loadOffcuts();
}
async function doLogin(){
  $('li-err').textContent='';
  const email=$('li-email').value.trim(),password=$('li-pass').value;
  if(!email||!password){$('li-err').textContent='Enter email and password.';return;}
  try{
    const r=await fetch(SB_URL+'/auth/v1/token?grant_type=password',{method:'POST',headers:{'apikey':SB_KEY,'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.error_description||d.msg||'Sign in failed');
    _token=d.access_token;_user={id:d.user.id,email:d.user.email};
    localStorage.setItem('tce_token',_token);localStorage.setItem('tce_user',JSON.stringify(_user));
    showApp();
  }catch(e){$('li-err').textContent=e.message;}
}
function signOut(){localStorage.removeItem('tce_token');localStorage.removeItem('tce_user');_token=null;_user=null;showLogin();}

// ---- data ----
async function loadDecors(){
  // existing boards (not offcuts) → decor suggestions + colour memory
  try{
    const r=await fetch(SB_URL+'/rest/v1/tce_library?select=name,color,thick&is_offcut=eq.false&order=name',{headers:H()});
    if(r.ok){
      const rows=await r.json();
      const seen={};_decors=[];
      rows.forEach(x=>{if(x.name&&!seen[x.name]){seen[x.name]=1;_decors.push(x);}});
      $('decorlist').innerHTML=_decors.map(d=>`<option value="${esc(d.name)}">`).join('');
    }
  }catch(e){}
}
async function loadOffcuts(){
  try{
    const r=await fetch(SB_URL+'/rest/v1/tce_library?select=*&is_offcut=eq.true&status=eq.in_stock&order=name',{headers:H()});
    if(!r.ok){toast('Could not load stock',true);return;}
    _offcuts=await r.json();
    // build thickness filter
    const ths=[...new Set(_offcuts.map(o=>o.thick))].sort((a,b)=>a-b);
    $('fthick').innerHTML='<option value="">All thickness</option>'+ths.map(t=>`<option value="${t}">${t}mm</option>`).join('');
    renderList();
  }catch(e){toast('Network error',true);}
}

function genCode(){const a='23456789ABCDEFGHJKLMNPQRSTUVWXYZ';return 'OC-'+Array.from({length:4},()=>a[Math.floor(Math.random()*a.length)]).join('');}

function onDecorInput(){
  const v=$('f-name').value.trim().toLowerCase();
  const m=_decors.find(d=>d.name.toLowerCase()===v);
  if(m){if(m.color)$('f-color').value=m.color;if(m.thick&&!$('f-thick').value)$('f-thick').value=m.thick;}
}

async function addOffcut(){
  const name=$('f-name').value.trim();
  const l=parseInt($('f-l').value),w=parseInt($('f-w').value),thick=parseFloat($('f-thick').value);
  const qty=Math.max(1,parseInt($('f-qty').value)||1);
  if(!name){toast('Enter a decor',true);return;}
  if(!l||!w){toast('Enter length & width',true);return;}
  const row={
    name,l,w,thick:thick||0,cost:0,notes:$('f-cust').value.trim(),
    grain_len:$('f-grain').checked,color:$('f-color').value,
    is_offcut:true,qty,location:$('f-loc').value.trim()||null
  };
  try{
    let r;
    if(_editingId){
      r=await fetch(SB_URL+'/rest/v1/tce_library?id=eq.'+_editingId,{method:'PATCH',headers:Hrep(),body:JSON.stringify(row)});
    }else{
      row.status='in_stock';row.code=genCode();row.user_id=_user.id;row.label_printed=false;  // queue for the workshop printer
      r=await fetch(SB_URL+'/rest/v1/tce_library',{method:'POST',headers:Hrep(),body:JSON.stringify(row)});
    }
    if(!r.ok){const e=await r.text();toast('Save failed',true);console.warn(e);return;}
    const saved=(await r.json())[0]||{};
    if(_editingId){ toast('Updated '+(saved.code||'')); exitEditMode(); }
    else{ toast('Added '+(saved.code||'')); clearSizeFields(); $('f-l').focus(); }   // keep decor/thick/colour/bay/customer for fast repeat
    await loadOffcuts();
  }catch(e){toast('Network error',true);}
}
function clearSizeFields(){$('f-l').value='';$('f-w').value='';$('f-qty').value='1';}
function exitEditMode(){
  _editingId=null;
  const b=$('addBtn'); if(b)b.textContent='+ Add to stock';
  const c=$('cancelEditBtn'); if(c)c.style.display='none';
  ['f-name','f-thick','f-l','f-w','f-loc','f-cust'].forEach(id=>$(id).value='');
  $('f-qty').value='1';$('f-grain').checked=true;$('f-color').value='#4e9af1';
}
function editOffcut(id){
  const o=_offcuts.find(x=>x.id===id);if(!o)return;
  _editingId=id;
  $('f-name').value=o.name||'';
  $('f-l').value=o.l||'';$('f-w').value=o.w||'';$('f-thick').value=o.thick||'';
  $('f-qty').value=o.qty||1;$('f-loc').value=o.location||'';$('f-cust').value=o.notes||'';
  $('f-color').value=o.color||'#4e9af1';$('f-grain').checked=!!o.grain_len;
  $('addBtn').textContent='Save changes';
  $('cancelEditBtn').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
  toast('Editing '+(o.code||'')+' — adjust the size if it was re-trimmed');
}

function renderList(){
  const q=$('q').value.trim().toLowerCase();
  const ft=$('fthick').value;
  let items=_offcuts.slice();
  if(ft!=='')items=items.filter(o=>String(o.thick)===ft);
  if(q)items=items.filter(o=>(o.name+' '+(o.code||'')+' '+(o.location||'')+' '+(o.notes||'')).toLowerCase().includes(q));
  items.sort((a,b)=>(a.name||'').localeCompare(b.name||'')||(b.l*b.w)-(a.l*a.w));
  $('count').textContent=items.length+' offcut'+(items.length===1?'':'s')+(ft?(' · '+ft+'mm'):'');
  if(!items.length){$('list').innerHTML='<div class="empty">No offcuts'+(q||ft?' match your filter':' logged yet — add one above')+'.</div>';return;}
  $('list').innerHTML=items.map(o=>`
    <div class="oc">
      <div class="swatch" style="background:${esc(o.color||'#4e9af1')}"></div>
      <div class="body">
        <div class="code">${esc(o.code||'')}${o.qty>1?` <span class="pill-qty">×${o.qty}</span>`:''}${o.label_printed===false?` <span style="color:#e6a23c;font-size:11px;font-family:var(--mono)">🕓 label queued</span>`:''}</div>
        <div class="decor">${esc(o.name)}</div>
        <div class="meta">${o.l} × ${o.w} · ${o.thick}mm${o.grain_len?' · grain ↕':''}</div>
        ${o.location?`<span class="loc">📍 ${esc(o.location)}</span>`:''}
        ${o.notes?`<div class="meta" style="color:var(--txt3);margin-top:3px">👤 ${esc(o.notes)}</div>`:''}
      </div>
      <div class="acts">
        <button class="btn btn-sm" onclick="printLabel(${o.id})">🏷 Label</button>
        <button class="btn btn-sm" onclick="editOffcut(${o.id})">Edit</button>
        <button class="btn btn-sm" onclick="useOne(${o.id})">Use 1</button>
        <button class="btn btn-sm btn-danger" onclick="delOffcut(${o.id})">Delete</button>
      </div>
    </div>`).join('');
}

async function useOne(id){
  const o=_offcuts.find(x=>x.id===id);if(!o)return;
  const newQty=(o.qty||1)-1;
  const patch=newQty<=0?{qty:0,status:'used',used_at:new Date().toISOString()}:{qty:newQty};
  try{
    const r=await fetch(SB_URL+'/rest/v1/tce_library?id=eq.'+id,{method:'PATCH',headers:H(),body:JSON.stringify(patch)});
    if(!r.ok){toast('Update failed',true);return;}
    toast(newQty<=0?'Marked used':'Used 1 ('+newQty+' left)');
    await loadOffcuts();
  }catch(e){toast('Network error',true);}
}

async function delOffcut(id){
  const o=_offcuts.find(x=>x.id===id);if(!o)return;
  if(!confirm('Delete '+(o.code||'this offcut')+'?'))return;
  try{
    const r=await fetch(SB_URL+'/rest/v1/tce_library?id=eq.'+id,{method:'DELETE',headers:H()});
    if(!r.ok){toast('Delete failed',true);return;}
    toast('Deleted');
    await loadOffcuts();
  }catch(e){toast('Network error',true);}
}

// ---- DYMO label printing (same web service as the offload station) ----
const DYMO_HOST='https://127.0.0.1';
const DYMO_PORTS=[41951,41952,41953,41954,41955,41956,41957,41958,41959,41960];
let _dymoBase=null,_dymoPrinter='';
async function _probeDymo(base,ms){
  const ctrl=new AbortController();const t=setTimeout(()=>ctrl.abort(),ms);
  try{const r=await fetch(base+'StatusConnected',{method:'GET',signal:ctrl.signal});clearTimeout(t);
    return r.ok&&(await r.text()).trim().toLowerCase().indexOf('true')>=0;}catch(e){clearTimeout(t);return false;}
}
async function findDymo(){
  for(const port of DYMO_PORTS){
    const base=DYMO_HOST+':'+port+'/DYMO/DLS/Printing/';
    if(await _probeDymo(base,1500)){
      _dymoBase=base;
      try{const xml=await (await fetch(base+'GetPrinters')).text();
        const names=[...xml.matchAll(/<Name>(.*?)<\/Name>/g)].map(m=>m[1]);
        _dymoPrinter=names.find(n=>/labelwriter/i.test(n))||names[0]||'';}catch(e){_dymoPrinter='';}
      return base;
    }
  }
  _dymoBase=null;return null;
}
async function ensureDymo(){return _dymoBase||await findDymo();}

// one text field in the DYMO DesktopLabel XML (proven structure from the cut labels)
function _to(name,text,size,align,x,y,w,h,rot){
  rot=rot||'Rotation0';
  return `<TextObject><Name>${name}</Name><Brushes><BackgroundBrush><SolidColorBrush><Color A="0" R="0" G="0" B="0"></Color></SolidColorBrush></BackgroundBrush><BorderBrush><SolidColorBrush><Color A="1" R="0" G="0" B="0"></Color></SolidColorBrush></BorderBrush><StrokeBrush><SolidColorBrush><Color A="1" R="0" G="0" B="0"></Color></SolidColorBrush></StrokeBrush><FillBrush><SolidColorBrush><Color A="0" R="0" G="0" B="0"></Color></SolidColorBrush></FillBrush></Brushes><Rotation>${rot}</Rotation><OutlineThickness>1</OutlineThickness><IsOutlined>False</IsOutlined><BorderStyle>SolidLine</BorderStyle><Margin><DYMOThickness Left="0" Top="0" Right="0" Bottom="0" /></Margin><HorizontalAlignment>${align}</HorizontalAlignment><VerticalAlignment>Middle</VerticalAlignment><FitMode>AlwaysFit</FitMode><IsVertical>False</IsVertical><FormattedText><FitMode>AlwaysFit</FitMode><HorizontalAlignment>${align}</HorizontalAlignment><VerticalAlignment>Middle</VerticalAlignment><IsVertical>False</IsVertical><LineTextSpan><TextSpan><Text>${esc(text)}</Text><FontInfo><FontName>Segoe UI</FontName><FontSize>${size}</FontSize><IsBold>True</IsBold><IsItalic>False</IsItalic><IsUnderline>False</IsUnderline><FontBrush><SolidColorBrush><Color A="1" R="0" G="0" B="0"></Color></SolidColorBrush></FontBrush></FontInfo></TextSpan></LineTextSpan></FormattedText><ObjectLayout><DYMOPoint><X>${x}</X><Y>${y}</Y></DYMOPoint><Size><Width>${w}</Width><Height>${h}</Height></Size></ObjectLayout></TextObject>`;
}
function offcutLabelXml(o){
  // Printed landscape (the orientation the DYMO is happy with), but every field is rotated 90°
  // and laid along the long 57mm edge. Turn the printed label a quarter-turn and it reads TALL:
  // code in the wrap strip, fold guide at ~16.5mm, then code + details on the face.
  const size=`${o.l} x ${o.w}  -  ${o.thick}mm`;
  let cust=o.notes?String(o.notes).replace(/\s*[-—]\s*Rev\s*\d+\s*$/i,'').trim():'';
  if(cust.length>26) cust=cust.slice(0,25).replace(/\s+\S*$/,'').trim()+'…';
  const R='Rotation270', Y=0.06, H=1.01;
  const body=
    _to('OcCodeTop',o.code||'',20,'Center',0.08,Y,0.42,H,R)+
    _to('OcFold','— fold —',7,'Center',0.56,Y,0.10,H,R)+
    _to('OcCode',o.code||'',18,'Center',0.70,Y,0.38,H,R)+
    _to('OcDecor',o.name||'',11,'Center',1.12,Y,0.22,H,R)+
    _to('OcSize',size,13,'Center',1.36,Y,0.26,H,R)+
    _to('OcBay',o.location?('Bay: '+o.location):'',10,'Center',1.66,Y,0.18,H,R)+
    _to('OcCust',cust?('Cust: '+cust):'',10,'Center',1.86,Y,0.18,H,R);
  return `<?xml version="1.0" encoding="utf-8"?><DesktopLabel Version="1"><DYMOLabel Version="4"><Description>DYMO Label</Description><Orientation>Portrait</Orientation><LabelName>S0722540 multipurpose</LabelName><InitialLength>0</InitialLength><BorderStyle>SolidLine</BorderStyle><DYMORect><DYMOPoint><X>0.04</X><Y>0.06</Y></DYMOPoint><Size><Width>2.17</Width><Height>1.13</Height></Size></DYMORect><BorderColor><SolidColorBrush><Color A="1" R="0" G="0" B="0"></Color></SolidColorBrush></BorderColor><BorderThickness>1</BorderThickness><Show_Border>False</Show_Border><HasFixedLength>False</HasFixedLength><FixedLengthValue>0</FixedLengthValue><DynamicLayoutManager><RotationBehavior>ClearObjects</RotationBehavior><LabelObjects>${body}</LabelObjects></DynamicLayoutManager></DYMOLabel></DesktopLabel>`;
}

async function printLabel(id){
  const o=_offcuts.find(x=>x.id===id);if(!o)return;
  toast('Finding printer…');
  const base=await ensureDymo();
  if(base){
    try{
      const r=await fetch(base+'PrintLabel',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body:'printerName='+encodeURIComponent(_dymoPrinter)+'&labelXml='+encodeURIComponent(offcutLabelXml(o))+'&printParamsXml=&labelSetXml='});
      if(r.ok){
        if(o.label_printed===false){ try{ await fetch(SB_URL+'/rest/v1/tce_library?id=eq.'+o.id,{method:'PATCH',headers:H(),body:JSON.stringify({label_printed:true})}); o.label_printed=true; renderList(); }catch(e){} }
        toast('Label sent ✓ '+(o.code||''));return;
      }
      toast('Printer error '+r.status,true);
    }catch(e){_dymoBase=null;}
  }
  // No local printer (e.g. you're on your phone) → queue it for the workshop station
  try{
    await fetch(SB_URL+'/rest/v1/tce_library?id=eq.'+o.id,{method:'PATCH',headers:H(),body:JSON.stringify({label_printed:false})});
    o.label_printed=false; renderList();
    toast('Queued for the workshop printer ✓');
  }catch(e){ toast('Could not queue label',true); }
}
function browserLabel(o){
  $('lbl-code').textContent=o.code||'';
  $('lbl-decor').textContent=o.name||'';
  $('lbl-meta').textContent=`${o.l} x ${o.w} - ${o.thick}mm`+(o.grain_len?' - grain along length':'');
  $('lbl-loc').textContent=(o.location?('Bay: '+o.location):'')+(o.notes?('   ·   Cust: '+o.notes):'');
  window.print();
}

init();

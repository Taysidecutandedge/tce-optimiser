<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>TCE — Edgebanding Stock</title>
<style>
:root{--bg:#0a0b0f;--surf:#15171e;--surf2:#1e2128;--brd:#2a2e38;--txt:#f0eeea;--txt2:#a8b0bd;--txt3:#6b7280;--acc:#d4820a;--ok:#27ae60;--low:#c0392b;--mono:'SF Mono',ui-monospace,Menlo,Consolas,monospace}
*{box-sizing:border-box;margin:0;padding:0;touch-action:manipulation}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--txt);font-size:15px;line-height:1.4;-webkit-text-size-adjust:100%}
.wrap{max-width:760px;margin:0 auto;padding:0 0 90px}
header{position:sticky;top:0;z-index:10;background:var(--surf);border-bottom:2px solid var(--acc);padding:12px 16px;display:flex;align-items:center;gap:10px}
header h1{font-size:16px;font-weight:700}
header .sub{font-size:11px;color:var(--txt3);font-family:var(--mono)}
header .right{margin-left:auto;display:flex;gap:8px;align-items:center}
.btn{background:var(--surf2);border:1px solid var(--brd);color:var(--txt);border-radius:8px;padding:9px 14px;font-size:14px;cursor:pointer;font-weight:600}
.btn:active{transform:scale(.97)}
.btn-acc{background:var(--acc);color:#111;border-color:var(--acc)}
.btn-sm{padding:6px 10px;font-size:13px;border-radius:6px}
.btn-ghost{background:transparent}
.btn-danger{color:#ff8a80;border-color:#5a2a2a}
section{padding:14px 16px}
.card{background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:14px;margin-bottom:14px}
.card h2{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--acc);margin-bottom:10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{display:flex;flex-direction:column;gap:4px}
.field.full{grid-column:1/-1}
.field label{font-size:11px;color:var(--txt2);font-weight:600}
input,select{background:var(--surf2);border:1px solid var(--brd);color:var(--txt);border-radius:8px;padding:11px;font-size:16px;width:100%;font-family:inherit}
input:focus,select:focus{outline:none;border-color:var(--acc)}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.toolbar input[type=search]{flex:1;min-width:140px}
.toolbar select{width:auto;min-width:110px}
.count{font-size:12px;color:var(--txt3);font-family:var(--mono)}
.chk{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--txt2)}
.chk input{width:18px;height:18px}
.grp{margin-bottom:8px;border:1px solid var(--brd);border-radius:10px;overflow:hidden;background:var(--surf)}
.grp-hdr{display:flex;align-items:center;gap:10px;padding:12px;cursor:pointer}
.grp-hdr:active{background:var(--surf2)}
.grp-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.grp-sub{font-size:12px;color:var(--txt3);font-family:var(--mono)}
.grp-chev{color:var(--txt2);font-size:13px;flex-shrink:0}
.grp-body{padding:0 8px 8px}
.roll{background:var(--surf2);border:1px solid var(--brd);border-radius:10px;padding:12px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start}
.roll .body{flex:1;min-width:0}
.roll .rem{font-size:17px;font-weight:700;font-family:var(--mono)}
.roll .meta{font-size:13px;color:var(--txt2);font-family:var(--mono)}
.roll .loc{display:inline-block;background:var(--surf);border:1px solid var(--brd);border-radius:5px;padding:1px 7px;font-size:12px;color:var(--txt);margin-top:4px;font-family:var(--mono)}
.roll .acts{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.bar{height:6px;background:var(--surf);border-radius:3px;overflow:hidden;margin:5px 0}
.bar > span{display:block;height:100%;background:var(--ok)}
.low .rem{color:#ff8a80}
.low .bar > span{background:var(--low)}
.lowtag{background:var(--low);color:#fff;font-size:10px;padding:1px 6px;border-radius:4px;font-family:var(--mono);margin-left:6px}
.empty{text-align:center;color:var(--txt3);padding:40px 16px;font-size:14px}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#fff;color:#111;padding:10px 18px;border-radius:10px;font-weight:600;font-size:14px;box-shadow:0 8px 30px rgba(0,0,0,.5);z-index:100;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
.toast.err{background:#c0392b;color:#fff}
#login{max-width:380px;margin:60px auto;padding:0 18px}
#login .card{padding:22px}
#login h1{font-size:20px;margin-bottom:4px}
#login p{font-size:13px;color:var(--txt3);margin-bottom:18px}
.hidden{display:none!important}
.stat{display:flex;gap:14px;margin-bottom:12px}
.stat > div{flex:1;background:var(--surf2);border-radius:8px;padding:10px 12px}
.stat .lbl{font-size:11px;color:var(--txt3)}
.stat .val{font-size:20px;font-weight:700;font-family:var(--mono)}
</style>
</head>
<body>

<div id="login" class="hidden">
  <div class="card">
    <h1>Edgebanding Stock</h1>
    <p>Sign in with your TCE optimiser account.</p>
    <div class="field" style="margin-bottom:10px"><label>Email</label><input id="li-email" type="email" autocomplete="username"></div>
    <div class="field" style="margin-bottom:16px"><label>Password</label><input id="li-pass" type="password" autocomplete="current-password"></div>
    <button class="btn btn-acc" style="width:100%" onclick="doLogin()">Sign in</button>
    <div id="li-err" style="color:#ff8a80;font-size:13px;margin-top:10px"></div>
  </div>
</div>

<div id="app" class="hidden">
  <header>
    <div><h1>Edgebanding Stock</h1><div class="sub" id="userline"></div></div>
    <div class="right">
      <a class="btn btn-sm btn-ghost" href="./index.html">◀ Optimiser</a>
      <a class="btn btn-sm btn-ghost" href="./offcuts.html" title="Offcut stock">🧩 Offcuts</a>
      <button class="btn btn-sm btn-ghost" onclick="signOut()">Sign out</button>
    </div>
  </header>
  <div class="wrap">
    <section>
      <div class="card">
        <h2>Add roll</h2>
        <div class="grid">
          <div class="field full">
            <label>Decor / colour</label>
            <input id="f-decor" list="decorlist" placeholder="e.g. U763 ST9 Pearl Grey" oninput="onDecorInput()">
            <datalist id="decorlist"></datalist>
          </div>
          <div class="field"><label>Tape width (mm)</label><input id="f-width" type="number" inputmode="decimal" placeholder="23"></div>
          <div class="field"><label>Tape thickness (mm)</label><input id="f-thick" type="number" inputmode="decimal" step="0.1" placeholder="1"></div>
          <div class="field"><label>Roll length (m)</label><input id="f-total" type="number" inputmode="decimal" placeholder="75"></div>
          <div class="field"><label>Remaining (m)</label><input id="f-rem" type="number" inputmode="decimal" placeholder="= roll length"></div>
          <div class="field"><label>Supplier</label><input id="f-supp" placeholder="Egger / Hranipex…"></div>
          <div class="field"><label>Bay / location</label><input id="f-loc" placeholder="e.g. EB rack 2"></div>
          <div class="field full"><label>Low-stock alert below (m)</label><input id="f-low" type="number" inputmode="decimal" value="5"></div>
        </div>
        <button class="btn btn-acc" id="addBtn" style="width:100%;margin-top:12px" onclick="addRoll()">+ Add roll</button>
        <button class="btn btn-ghost" id="cancelEditBtn" style="display:none;width:100%;margin-top:8px" onclick="exitEditMode()">Cancel edit</button>
      </div>
    </section>
    <section style="padding-top:0">
      <div class="stat">
        <div><div class="lbl">Total remaining</div><div class="val" id="stat-total">–</div></div>
        <div><div class="lbl">Decors</div><div class="val" id="stat-decors">–</div></div>
        <div><div class="lbl">Low stock</div><div class="val" id="stat-low" style="color:#ff8a80">–</div></div>
      </div>
      <div class="toolbar">
        <input id="q" type="search" placeholder="Search decor, supplier, bay…" oninput="renderList()">
        <select id="fsort" onchange="renderList()"><option value="decor">Sort: decor</option><option value="rem">Least remaining</option></select>
        <label class="chk"><input id="flow" type="checkbox" onchange="renderList()"> Low stock only</label>
        <span class="count" id="count"></span>
      </div>
      <div id="list"></div>
    </section>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB_URL='https://mxjduublgtlpqtdgutzi.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14amR1dWJsZ3RscHF0ZGd1dHppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwOTg2MjMsImV4cCI6MjA5MTY3NDYyM30.wfG9a91Udp7KQ7ywda6aNS9k-n79qtrGSe-epuCuk34';
let _token=null,_user=null,_rolls=[],_decors=[],_editingId=null,_expanded=new Set();
const H=()=>({'apikey':SB_KEY,'Authorization':'Bearer '+(_token||SB_KEY),'Content-Type':'application/json'});
const Hrep=()=>({...H(),'Prefer':'return=representation'});
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const $=id=>document.getElementById(id);
const jsAttr=s=>String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
function toast(m,err){const t=$('toast');t.textContent=m;t.className='toast show'+(err?' err':'');setTimeout(()=>t.className='toast',1900);}

async function init(){
  const tok=localStorage.getItem('tce_token');
  if(tok){ try{ const r=await fetch(SB_URL+'/auth/v1/user',{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+tok}}); if(r.ok){const d=await r.json();_token=tok;_user={id:d.id,email:d.email};return showApp();} }catch(e){} }
  showLogin();
}
function showLogin(){$('login').classList.remove('hidden');$('app').classList.add('hidden');}
async function showApp(){ $('login').classList.add('hidden');$('app').classList.remove('hidden');$('userline').textContent=_user.email; await loadDecors(); await loadRolls(); }
async function doLogin(){
  $('li-err').textContent='';
  const email=$('li-email').value.trim(),password=$('li-pass').value;
  if(!email||!password){$('li-err').textContent='Enter email and password.';return;}
  try{
    const r=await fetch(SB_URL+'/auth/v1/token?grant_type=password',{method:'POST',headers:{'apikey':SB_KEY,'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const d=await r.json(); if(!r.ok)throw new Error(d.error_description||d.msg||'Sign in failed');
    _token=d.access_token;_user={id:d.user.id,email:d.user.email};
    localStorage.setItem('tce_token',_token);localStorage.setItem('tce_user',JSON.stringify(_user));
    showApp();
  }catch(e){$('li-err').textContent=e.message;}
}
function signOut(){localStorage.removeItem('tce_token');localStorage.removeItem('tce_user');_token=null;_user=null;showLogin();}

async function loadDecors(){
  try{
    const r=await fetch(SB_URL+'/rest/v1/tce_library?select=name,thick,is_offcut',{headers:H()});
    if(r.ok){
      const rows=await r.json(); const norm=s=>String(s||'').toLowerCase().replace(/\s+/g,' ').trim(); const map={};
      rows.forEach(x=>{ if(!x.name)return; const k=norm(x.name); if(!k)return;
        if(!map[k]) map[k]={name:x.name,thick:x.thick,isBoard:x.is_offcut===false};
        else if(x.is_offcut===false && !map[k].isBoard) map[k]={name:x.name,thick:x.thick,isBoard:true}; });
      _decors=Object.values(map).sort((a,b)=>String(a.name).localeCompare(String(b.name)));
      $('decorlist').innerHTML=_decors.map(d=>`<option value="${esc(d.name)}">`).join('');
    }
  }catch(e){}
}
function onDecorInput(){
  const v=$('f-decor').value.trim().toLowerCase();
  const tm=v.match(/^(\d+(?:\.\d+)?)\s*mm\b/);
  if(tm && !$('f-thick').value) $('f-thick').value=tm[1];
}
async function loadRolls(){
  try{
    const r=await fetch(SB_URL+'/rest/v1/tce_eb_rolls?select=*&status=eq.in_stock&order=decor',{headers:H()});
    if(!r.ok){toast('Could not load stock',true);return;}
    _rolls=await r.json(); renderList();
  }catch(e){toast('Network error',true);}
}
function genCode(){const a='23456789ABCDEFGHJKLMNPQRSTUVWXYZ';return 'EB-'+Array.from({length:4},()=>a[Math.floor(Math.random()*a.length)]).join('');}

async function addRoll(){
  const decor=$('f-decor').value.trim();
  if(!decor){toast('Enter a decor',true);return;}
  const total=parseFloat($('f-total').value)||null;
  let rem=$('f-rem').value!==''?parseFloat($('f-rem').value):total;
  const row={
    decor, tape_width:parseFloat($('f-width').value)||null, tape_thick:parseFloat($('f-thick').value)||null,
    supplier:$('f-supp').value.trim()||null, total_m:total, remaining_m:rem,
    low_stock_m:parseFloat($('f-low').value)||5, location:$('f-loc').value.trim()||null
  };
  try{
    let r;
    if(_editingId){
      r=await fetch(SB_URL+'/rest/v1/tce_eb_rolls?id=eq.'+_editingId,{method:'PATCH',headers:Hrep(),body:JSON.stringify(row)});
    }else{
      row.status='in_stock';row.code=genCode();row.user_id=_user.id;
      r=await fetch(SB_URL+'/rest/v1/tce_eb_rolls',{method:'POST',headers:Hrep(),body:JSON.stringify(row)});
    }
    if(!r.ok){toast('Save failed',true);console.warn(await r.text());return;}
    const saved=(await r.json())[0]||{};
    toast(_editingId?'Updated':('Added '+(saved.code||'')));
    exitEditMode(); await loadRolls();
  }catch(e){toast('Network error',true);}
}
function exitEditMode(){
  _editingId=null; $('addBtn').textContent='+ Add roll'; $('cancelEditBtn').style.display='none';
  ['f-decor','f-width','f-thick','f-total','f-rem','f-supp','f-loc'].forEach(id=>$(id).value=''); $('f-low').value='5';
}
function editRoll(id){
  const o=_rolls.find(x=>x.id===id);if(!o)return; _editingId=id;
  $('f-decor').value=o.decor||''; $('f-width').value=o.tape_width||''; $('f-thick').value=o.tape_thick||'';
  $('f-total').value=o.total_m||''; $('f-rem').value=o.remaining_m!=null?o.remaining_m:''; $('f-supp').value=o.supplier||'';
  $('f-loc').value=o.location||''; $('f-low').value=o.low_stock_m!=null?o.low_stock_m:5;
  $('addBtn').textContent='Save changes'; $('cancelEditBtn').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'}); toast('Editing '+(o.code||''));
}
async function useRoll(id){
  const o=_rolls.find(x=>x.id===id);if(!o)return;
  const v=prompt('Metres used from '+(o.code||o.decor)+'? (remaining '+(o.remaining_m??'?')+'m)');
  if(v==null)return; const used=parseFloat(v); if(!(used>0)){toast('Enter a number',true);return;}
  const newRem=Math.max(0,(parseFloat(o.remaining_m)||0)-used);
  const patch=newRem<=0?{remaining_m:0,status:'empty'}:{remaining_m:newRem};
  try{
    const r=await fetch(SB_URL+'/rest/v1/tce_eb_rolls?id=eq.'+id,{method:'PATCH',headers:H(),body:JSON.stringify(patch)});
    if(!r.ok){toast('Update failed',true);return;}
    toast(newRem<=0?'Roll finished':('Used '+used+'m · '+newRem.toFixed(1)+'m left')); await loadRolls();
  }catch(e){toast('Network error',true);}
}
async function delRoll(id){
  const o=_rolls.find(x=>x.id===id);if(!o)return;
  if(!confirm('Delete '+(o.code||o.decor)+'?'))return;
  try{ const r=await fetch(SB_URL+'/rest/v1/tce_eb_rolls?id=eq.'+id,{method:'DELETE',headers:H()}); if(!r.ok){toast('Delete failed',true);return;} toast('Deleted'); await loadRolls(); }catch(e){toast('Network error',true);}
}
function toggleDecor(name){ if(_expanded.has(name))_expanded.delete(name); else _expanded.add(name); renderList(); }
function isLow(o){ return o.remaining_m!=null && o.low_stock_m!=null && Number(o.remaining_m)<=Number(o.low_stock_m); }

function rollCard(o){
  const total=Number(o.total_m)||0, rem=Number(o.remaining_m)||0;
  const pct=total>0?Math.max(0,Math.min(100,rem/total*100)):0;
  return `<div class="roll${isLow(o)?' low':''}">
    <div class="body">
      <div class="rem">${o.remaining_m!=null?o.remaining_m+'m':'?'}${o.total_m?(' <span class="meta">/ '+o.total_m+'m</span>'):''}${isLow(o)?'<span class="lowtag">LOW</span>':''}</div>
      <div class="bar"><span style="width:${pct}%"></span></div>
      <div class="meta">${o.tape_width?o.tape_width+'mm':'?'} wide${o.tape_thick?(' · '+o.tape_thick+'mm'):''}${o.supplier?(' · '+esc(o.supplier)):''}${o.code?(' · '+esc(o.code)):''}</div>
      ${o.location?`<span class="loc">📍 ${esc(o.location)}</span>`:''}
    </div>
    <div class="acts">
      <button class="btn btn-sm" onclick="useRoll(${o.id})">Use…</button>
      <button class="btn btn-sm" onclick="editRoll(${o.id})">Edit</button>
      <button class="btn btn-sm btn-danger" onclick="delRoll(${o.id})">Delete</button>
    </div>
  </div>`;
}
function renderList(){
  const q=$('q').value.trim().toLowerCase(); const sort=$('fsort').value; const lowOnly=$('flow').checked;
  let items=_rolls.slice();
  if(lowOnly)items=items.filter(isLow);
  if(q)items=items.filter(o=>((o.decor||'')+' '+(o.supplier||'')+' '+(o.location||'')+' '+(o.code||'')).toLowerCase().includes(q));
  // summary (all in-stock)
  const totalRem=_rolls.reduce((s,o)=>s+(Number(o.remaining_m)||0),0);
  $('stat-total').textContent=totalRem.toFixed(0)+'m';
  $('stat-decors').textContent=new Set(_rolls.map(o=>o.decor)).size;
  $('stat-low').textContent=_rolls.filter(isLow).length;
  $('count').textContent=items.length+' roll'+(items.length===1?'':'s');
  if(!items.length){$('list').innerHTML='<div class="empty">No rolls'+(q||lowOnly?' match your filter':' yet — add one above')+'.</div>';return;}
  const groups={}; items.forEach(o=>{(groups[o.decor]=groups[o.decor]||[]).push(o);});
  const names=Object.keys(groups).sort((a,b)=>String(a).localeCompare(String(b)));
  const cmp=sort==='rem'?((a,b)=>(Number(a.remaining_m)||0)-(Number(b.remaining_m)||0)):((a,b)=>(Number(b.remaining_m)||0)-(Number(a.remaining_m)||0));
  const searching=!!(q||lowOnly);
  $('list').innerHTML=names.map(name=>{
    const arr=groups[name].slice().sort(cmp);
    const rem=arr.reduce((s,o)=>s+(Number(o.remaining_m)||0),0);
    const anyLow=arr.some(isLow);
    const open=searching||_expanded.has(name);
    return `<div class="grp">
      <div class="grp-hdr" onclick="toggleDecor('${jsAttr(name)}')">
        <div style="flex:1;min-width:0">
          <div class="grp-name">${esc(name)}${anyLow?'<span class="lowtag">LOW</span>':''}</div>
          <div class="grp-sub">${arr.length} roll${arr.length===1?'':'s'} · ${rem.toFixed(0)}m left</div>
        </div>
        <div class="grp-chev">${open?'▾':'▸'}</div>
      </div>
      ${open?`<div class="grp-body">${arr.map(rollCard).join('')}</div>`:''}
    </div>`;
  }).join('');
}
init();
</script>
</body>
</html>
